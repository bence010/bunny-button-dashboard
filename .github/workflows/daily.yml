name: Daily Bunny Report

on:
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Bunny Report + send Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          import bunny_report as b, os, sys
          report = b.build_report()
          print(report)
          token = os.getenv('TELEGRAM_TOKEN')
          chat_ids = os.getenv('TELEGRAM_CHAT_ID', '')
          print(f'Token exists: {bool(token)}', file=sys.stderr)
          print(f'Chat IDs: {chat_ids}', file=sys.stderr)
          if token and chat_ids:
              for cid in chat_ids.split(','):
                  cid = cid.strip()
                  try:
                      result = b.send_telegram(report, token, cid)
                      print(f'Sent to {cid}: ok', file=sys.stderr)
                  except Exception as e:
                      print(f'Error {cid}: {e}', file=sys.stderr)
          "

      - name: Save state for tomorrow
        run: |
          git config user.name  'bunny-bot'
          git config user.email 'bot@users.noreply.github.com'
          git add bunny_report_state.json
          git diff --cached --quiet || git commit -m '📊 daily state update'
          git push
