name: Daily Bunny Report

on:
  schedule:
    - cron: '0 8 * * *'   # minden nap 8:00 UTC = 10:00 magyar idő
  workflow_dispatch:        # kézi indítás is lehetséges

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Bunny Report + send Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          import bunny_report as b, os, sys
          report = b.build_report()
          print(report)
          token   = os.getenv('TELEGRAM_TOKEN')
          chat_id = os.getenv('TELEGRAM_CHAT_ID')
          if token and chat_id:
              try:
                  b.send_telegram(report, token, chat_id)
                  print('Telegram: OK', file=sys.stderr)
              except Exception as e:
                  print(f'Telegram error: {e}', file=sys.stderr)
          "

      - name: Save state for tomorrow
        run: |
          git config user.name  'bunny-bot'
          git config user.email 'bot@users.noreply.github.com'
          git add bunny_report_state.json
          git diff --cached --quiet || git commit -m '📊 daily state update'
          git push
