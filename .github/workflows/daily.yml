name: Daily Bunny Report

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:        

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Bunny Report + send Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "
          import bunny_report as b, os, sys
          report = b.build_report()
          print(report)
          token   = os.getenv('TELEGRAM_TOKEN')
          chat_ids = os.getenv("TELEGRAM_CHAT_ID", "TELEGRAM_CHAT_ID")
          print(f'Token exists: {bool(token)}', file=sys.stderr)
          print(f'Chat ID: {chat_id}', file=sys.stderr)
         if token and chat_id:
        for cid in chat_id.split(','):
        try:
            result = b.send_telegram(report, token, cid.strip())
            print(f'Sent to {cid}: ok', file=sys.stderr)
              except Exception as e:
            print(f'Error {cid}: {e}', file=sys.stderr)
          "
